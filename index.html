<!DOCTYPE html>
<html lang="bs"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>N CARS Zenica</title><meta name="theme-color" content="#080808"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#080808;--s:#0E0E0E;--card:#131313;--brd:#1A1A1A;--gold:#D4A853;--gdim:rgba(212,168,83,0.1);--t:#F0F0F0;--m:#888;--d:#444;--cyan:#22D3EE;--orange:#F97316;--f:'Outfit',sans-serif;--mono:'Space Grotesk',sans-serif;--e:cubic-bezier(0.16,1,0.3,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--f);background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}img{max-width:100%;display:block}a{text-decoration:none;color:inherit}button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}::selection{background:var(--gold);color:#000}
::-webkit-scrollbar{width:0;background:transparent}

/* MOBILE SCROLL GLOW */
.scroll-glow-left,.scroll-glow-right{position:fixed;top:0;bottom:0;width:7vw;z-index:9500;pointer-events:none;opacity:0;transition:opacity 0.3s}
.scroll-glow-left{left:0;background:linear-gradient(90deg,rgba(249,115,22,0.15),transparent)}
.scroll-glow-right{right:0;background:linear-gradient(-90deg,rgba(34,211,238,0.15),transparent)}
.scroll-glow-left.active,.scroll-glow-right.active{opacity:1}

@keyframes sCircleIn{0%{clip-path:circle(0% at 50% 50%)}100%{clip-path:circle(75% at 50% 50%)}}
@keyframes sLogo3D{0%{opacity:0;transform:perspective(800px) rotateY(90deg) scale(0.4);filter:blur(30px)}50%{opacity:1;filter:blur(0)}100%{transform:perspective(800px) rotateY(0) scale(1)}}
@keyframes sNameReveal{0%{opacity:0;transform:translateY(20px) scaleY(1.3);filter:blur(8px)}100%{opacity:1;transform:translateY(0) scaleY(1);filter:blur(0)}}
@keyframes sGoldLine{0%{transform:scaleX(0);opacity:0}100%{transform:scaleX(1);opacity:1}}
@keyframes sTagFade{0%{opacity:0;letter-spacing:12px}100%{opacity:1;letter-spacing:5px}}
@keyframes sCircleOut{to{clip-path:circle(0% at 50% 50%);opacity:0}}
@keyframes sBarCount{from{width:100%}to{width:0}}
@keyframes sParticleUp{0%{opacity:0;transform:translateY(0) scale(0.5)}25%{opacity:0.8}100%{opacity:0;transform:translateY(-150px) scale(1.8)}}
@keyframes goldShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.005)}}
@keyframes marqueeFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes cardPerspective{from{opacity:0;transform:perspective(1000px) rotateX(5deg) translateY(35px)}to{opacity:1;transform:perspective(1000px) rotateX(0) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:10001;background:radial-gradient(ellipse at 50% 40%,#141210 0%,#080808 60%,#050505 100%);display:flex;align-items:center;justify-content:center;clip-path:circle(75% at 50% 50%);animation:sCircleIn 1.5s var(--e) forwards;overflow:hidden}
#splash.out{animation:sCircleOut 0.9s var(--e) forwards}
.s-part{position:absolute;border-radius:50%;background:var(--gold);pointer-events:none}
.s-center{position:relative;z-index:2;text-align:center;perspective:1200px}
.s-logo{width:160px;height:160px;margin:0 auto 36px;opacity:0;transform-style:preserve-3d;animation:sLogo3D 1.4s var(--e) 0.5s forwards}
.s-logo img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 50px rgba(212,168,83,0.35)) drop-shadow(0 20px 40px rgba(0,0,0,0.5))}
.s-gold-line{width:180px;height:1.5px;margin:0 auto 28px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);animation:sGoldLine 0.7s var(--e) 1.6s forwards}
.s-name{font-weight:900;font-size:clamp(40px,10vw,72px);letter-spacing:0.12em;opacity:0;animation:sNameReveal 0.9s var(--e) 1.8s forwards;background:linear-gradient(90deg,#F0F0F0 20%,#D4A853 50%,#F0F0F0 80%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:sNameReveal 0.9s var(--e) 1.8s forwards,goldShimmer 4s linear 2.6s infinite}
.s-tag{font-weight:300;font-size:clamp(10px,1.5vw,13px);color:var(--m);letter-spacing:12px;text-transform:uppercase;margin-top:14px;opacity:0;animation:sTagFade 0.7s var(--e) 2.5s forwards}
.s-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--cyan));animation:sBarCount 4s linear forwards}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;transition:all 0.5s var(--e);padding:18px 0}
.nav.solid{background:rgba(8,8,8,0.93);backdrop-filter:blur(28px);padding:12px 0;border-bottom:1px solid var(--brd)}
.nav-in{max-width:1400px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.n-brand{display:flex;align-items:center;gap:12px}.n-brand img{height:36px}.n-brand span{font-weight:800;font-size:17px;letter-spacing:4px}
.n-links{display:flex;gap:36px}.n-link{color:var(--m);font-size:12px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;transition:all 0.3s;position:relative;padding:6px 0}
.n-link::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform 0.4s var(--e)}.n-link:hover{color:var(--gold)}.n-link:hover::after{transform:scaleX(1)}
.n-right{display:flex;gap:10px;align-items:center}
.n-icon{width:42px;height:42px;border-radius:50%;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all 0.3s var(--e)}
.n-icon:hover{border-color:var(--gold);background:var(--gdim);transform:scale(1.08)}
.n-cta{padding:10px 22px;background:var(--gold);color:#000;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;border-radius:8px;transition:all 0.3s}.n-cta:hover{background:#E8BC6A;box-shadow:0 4px 18px rgba(212,168,83,0.3)}
.n-ham{display:none;width:42px;height:42px;flex-direction:column;gap:6px;align-items:center;justify-content:center}
.n-ham span{width:20px;height:1.5px;background:var(--t);transition:all 0.3s}.n-ham.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}.n-ham.open span:nth-child(2){opacity:0}.n-ham.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* MOBILE OVERLAY */
.m-ov{position:fixed;inset:0;z-index:199;background:rgba(8,8,8,0.97);backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;pointer-events:none;transition:all 0.4s var(--e)}.m-ov.open{opacity:1;pointer-events:auto}
.m-ov a{font-size:22px;font-weight:700;letter-spacing:5px;color:var(--m);transition:all 0.3s}.m-ov a:hover{color:var(--gold)}

/* HERO — Horizontal split layout */
.hero{height:100vh;min-height:650px;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-img{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?w=2400&q=85') center/cover;opacity:0.3;filter:saturate(0.4) contrast(1.15)}
.hero-grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,8,8,0.92) 0%,rgba(8,8,8,0.7) 40%,rgba(8,8,8,0.4) 70%,rgba(8,8,8,0.6) 100%)}
.hero-in{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 32px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-text{max-width:560px}
.hero-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(212,168,83,0.3);border-radius:40px;color:var(--gold);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;opacity:0;animation:fadeUp 0.7s var(--e) 0.2s forwards}
.hero-h{font-weight:900;font-size:clamp(36px,5.5vw,68px);line-height:1.02;letter-spacing:-0.03em;margin-bottom:20px;opacity:0;animation:fadeUp 0.8s var(--e) 0.4s forwards}
.hero-h em{font-style:normal;background:linear-gradient(90deg,var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-p{font-weight:300;font-size:clamp(14px,1.3vw,17px);color:var(--m);line-height:1.75;margin-bottom:36px;opacity:0;animation:fadeUp 0.7s var(--e) 0.6s forwards}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeUp 0.7s var(--e) 0.8s forwards}
.btn{display:inline-flex;align-items:center;gap:10px;padding:15px 32px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:10px;transition:all 0.3s var(--e)}
.btn-g{background:var(--gold);color:#000}.btn-g:hover{background:#E8BC6A;transform:translateY(-3px);box-shadow:0 10px 32px rgba(212,168,83,0.25)}
.btn-o{border:1px solid var(--brd);color:var(--t)}.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.hero-visual{position:relative;opacity:0;animation:fadeUp 0.8s var(--e) 1s forwards}
.hero-card{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:28px;animation:heroFloat 8s ease-in-out infinite}
.hero-card-stat{display:flex;justify-content:space-between;margin-bottom:20px}
.hcs{text-align:center;flex:1}
.hcs-n{font-family:var(--mono);font-weight:700;font-size:28px;color:var(--gold)}
.hcs-l{font-size:9px;color:var(--d);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.hero-card-divider{width:1px;background:var(--brd);margin:0 16px}
.hero-card-brands{display:flex;gap:8px;flex-wrap:wrap}
.hcb{padding:6px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;font-size:11px;font-weight:500;color:var(--m);transition:all 0.2s}
.hcb:hover{border-color:var(--gold);color:var(--gold)}
.hero-scroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:var(--d);animation:bounce 2.5s ease-in-out infinite;text-align:center;z-index:1}
.hero-scroll span{font-size:8px;letter-spacing:4px;text-transform:uppercase;display:block;margin-top:6px}

/* MARQUEE */
.mq{overflow:hidden;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);padding:14px 0;white-space:nowrap;background:var(--s)}
.mq-track{display:inline-block;animation:marqueeFlow 25s linear infinite}
.mq-item{display:inline;font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--d);margin:0 32px}
.mq-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--gold);vertical-align:middle;margin:0 32px}

/* SECTION */
.sec{padding:100px 32px}
.sec-head{margin-bottom:56px}
.sec-ey{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.sec-ey::before{content:'';width:24px;height:1px;background:var(--gold)}
.sec-t{font-weight:800;font-size:clamp(26px,4vw,42px);letter-spacing:-0.02em;line-height:1.15}
.sec-sub{font-size:14px;color:var(--m);margin-top:10px;max-width:440px;line-height:1.6}

/* FILTER ROW */
.filters{display:flex;gap:8px;margin-bottom:36px;flex-wrap:wrap}
.fchip{padding:9px 22px;border:1px solid var(--brd);background:transparent;color:var(--m);border-radius:40px;font-size:11px;font-weight:600;letter-spacing:0.5px;transition:all 0.25s var(--e);cursor:pointer}
.fchip:hover{border-color:var(--gold);color:var(--gold)}.fchip.on{background:var(--gold);border-color:var(--gold);color:#000}

/* VEHICLE GRID — Masonry-like stagger */
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* VEHICLE CARD */
.vc{background:var(--card);border:1px solid var(--brd);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.5s var(--e);position:relative}
.vc::after{content:'';position:absolute;inset:-1px;border-radius:16px;background:linear-gradient(135deg,rgba(249,115,22,0.08),transparent 40%,transparent 60%,rgba(34,211,238,0.08));opacity:0;transition:opacity 0.4s;pointer-events:none}
.vc:hover{transform:translateY(-10px);box-shadow:0 28px 70px rgba(0,0,0,0.5),0 0 0 1px rgba(212,168,83,0.15)}
.vc:hover::after{opacity:1}
.vc:hover .vc-img{transform:scale(1.07)}
.vc:hover .vc-ov{opacity:1}
.vc-imgwrap{position:relative;aspect-ratio:16/10;overflow:hidden;background:#0A0A0A}
.vc-img{width:100%;height:100%;background-size:cover;background-position:center;transition:transform 0.7s var(--e)}
.vc-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,8,8,0.95) 0%,transparent 45%);opacity:0;transition:opacity 0.4s;display:flex;align-items:flex-end;justify-content:space-between;padding:18px;z-index:2}
.vc-ov-price{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--gold)}
.vc-ov-btn{padding:8px 18px;background:var(--gold);color:#000;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:8px}
.vc-badge{position:absolute;top:14px;left:14px;padding:5px 14px;background:rgba(8,8,8,0.7);backdrop-filter:blur(14px);border:1px solid rgba(212,168,83,0.2);border-radius:40px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);z-index:3}
.vc-body{padding:20px}
.vc-name{font-weight:700;font-size:15px;margin-bottom:6px;letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc-meta{font-size:11px;color:var(--d);margin-bottom:14px;letter-spacing:0.5px}
.vc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.vc-tag{padding:4px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--brd);border-radius:8px;font-size:10px;color:var(--m);font-weight:500}
.vc-bottom{display:flex;justify-content:space-between;align-items:center}
.vc-price{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--gold)}
.vc-link{font-size:11px;color:var(--d);transition:all 0.2s}.vc:hover .vc-link{color:var(--gold)}

/* TRUST — Horizontal cards */
.trust{padding:80px 32px;background:var(--s);border-top:1px solid var(--brd);border-bottom:1px solid var(--brd)}
.trust-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.trust-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:28px;text-align:center;transition:all 0.4s var(--e)}
.trust-card:hover{transform:translateY(-6px);border-color:rgba(212,168,83,0.2);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.trust-icon{width:52px;height:52px;margin:0 auto 16px;border-radius:14px;background:var(--gdim);border:1px solid rgba(212,168,83,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.3s}
.trust-card:hover .trust-icon{background:var(--gold);transform:scale(1.08)}
.trust-card:hover .trust-icon span{filter:brightness(0)}
.trust-t{font-weight:700;font-size:15px;margin-bottom:8px;letter-spacing:0.3px}
.trust-d{font-size:12px;color:var(--m);line-height:1.6}

/* CONTACT */
.contact{padding:100px 32px;background:var(--bg)}
.ct-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.3fr 1fr;gap:80px;align-items:start}
.ct-left h2{font-weight:900;font-size:clamp(28px,4vw,44px);letter-spacing:-0.02em;margin-bottom:14px;line-height:1.1}
.ct-left h2 em{font-style:normal;color:var(--gold)}
.ct-left>p{color:var(--m);font-size:14px;line-height:1.7;margin-bottom:40px;max-width:400px}
.ct-items{display:flex;flex-direction:column;gap:20px}
.ct-item{display:flex;gap:16px;align-items:center}
.ct-icon{width:50px;height:50px;border-radius:14px;background:var(--gdim);border:1px solid rgba(212,168,83,0.12);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all 0.3s}
.ct-item:hover .ct-icon{background:var(--gold);transform:scale(1.05)}
.ct-lb{font-size:9px;color:var(--d);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.ct-v{font-size:14px}.ct-v a{color:var(--t);transition:color 0.2s}.ct-v a:hover{color:var(--gold)}
.ct-form{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:36px}
.ct-ft{font-weight:700;font-size:20px;margin-bottom:28px;letter-spacing:0.3px}
.ct-ff{margin-bottom:18px}
.ct-fl{font-size:9px;font-weight:600;color:var(--d);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.ct-fi{width:100%;padding:14px 18px;background:var(--bg);border:1px solid var(--brd);border-radius:12px;color:var(--t);font-size:14px;transition:all 0.3s;outline:none;font-family:inherit}
.ct-fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}.ct-fi::placeholder{color:var(--d)}
.ct-fs{width:100%;padding:16px;background:var(--gold);color:#000;font-weight:700;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;border-radius:12px;transition:all 0.3s;border:none;cursor:pointer;margin-top:4px}.ct-fs:hover{background:#E8BC6A;box-shadow:0 8px 24px rgba(212,168,83,0.2)}

/* FOOTER */
.foot{padding:40px 32px 20px;border-top:1px solid var(--brd);background:var(--s)}
.foot-in{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.foot-b{display:flex;align-items:center;gap:10px}.foot-b img{height:26px}.foot-b span{font-weight:700;letter-spacing:3px;font-size:14px}
.foot-m{text-align:center;font-size:10px;color:var(--d);line-height:1.8;letter-spacing:1px}
.foot-s{display:flex;gap:8px}

/* FLOATING */
.flt{position:fixed;right:20px;bottom:100px;z-index:50;display:flex;flex-direction:column;gap:10px}
.flt a{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;transition:all 0.3s var(--e);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.flt .wa{background:#25D366}.flt .wa:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(37,211,102,0.3)}
.flt .ph{background:var(--gold);color:#000}.flt .ph:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(212,168,83,0.3)}
#btt{position:fixed;bottom:20px;right:20px;width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--brd);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:49}
#btt.on{opacity:1;pointer-events:auto}#btt:hover{background:var(--gold);color:#000}
#prog{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--cyan));z-index:9998;width:0%}

.reveal{opacity:0;transform:translateY(28px);transition:all 0.8s var(--e)}.reveal.vis{opacity:1;transform:translateY(0)}

@media(max-width:1024px){.vgrid{grid-template-columns:repeat(2,1fr)}.ct-grid{grid-template-columns:1fr}.hero-in{grid-template-columns:1fr}.hero-visual{display:none}.trust-grid{grid-template-columns:1fr;gap:16px}}
@media(max-width:768px){.n-links,.n-cta{display:none}.n-ham{display:flex}.vgrid{grid-template-columns:1fr}.sec,.contact,.trust{padding:60px 20px}.nav-in{padding:0 20px}.hero-in{padding:0 20px}.foot-in,.foot{padding-left:20px;padding-right:20px}.filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}#splash{display:none!important}}

/* ADMIN */
.pin-ov{position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
.pin-box{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:40px;width:90%;max-width:340px;text-align:center}
.pin-box h3{font-weight:700;font-size:20px;margin-bottom:6px}.pin-box p{font-size:13px;color:var(--m);margin-bottom:24px}
.pin-inp{width:140px;text-align:center;padding:14px;font-size:28px;letter-spacing:12px;font-family:var(--mono);border:2px solid var(--brd);border-radius:12px;background:var(--bg);color:var(--t);margin:0 auto 16px;display:block;outline:none}
.pin-inp:focus{border-color:var(--gold)}
.pin-err{color:#EF4444;font-size:12px;font-weight:600;margin-bottom:12px}
.pin-btn{padding:12px 32px;background:var(--gold);color:#000;border-radius:10px;font-weight:700;font-size:13px;letter-spacing:1px;border:none;cursor:pointer}.pin-btn:hover{background:#E8BC6A}
.pin-cancel{font-size:12px;color:var(--m);margin-top:12px;cursor:pointer;background:none;border:none;font-family:inherit}.pin-cancel:hover{color:var(--t)}

.adm-ov{position:fixed;inset:0;z-index:10003;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:flex;justify-content:flex-end}
.adm-panel{width:85vw;max-width:860px;background:var(--card);height:100%;overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,0.4);animation:fadeUp 0.3s var(--e);border-left:1px solid var(--brd)}
.adm-panel::before{content:'';position:sticky;top:0;display:block;height:3px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--cyan));z-index:1}
.adm-head{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:3px;background:var(--card);z-index:1}
.adm-title{font-weight:700;font-size:18px;display:flex;align-items:center;gap:10px}
.adm-badge{background:var(--gold);color:#000;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:1px}
.adm-close{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--m);cursor:pointer}.adm-close:hover{color:var(--t)}
.adm-body{padding:24px}
.adm-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--brd);padding-bottom:12px}
.adm-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--m);cursor:pointer;transition:all 0.2s}.adm-tab.on{background:var(--gold);color:#000}
.adm-field{margin-bottom:14px}
.adm-label{display:block;font-size:10px;font-weight:600;color:var(--d);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.adm-input{width:100%;padding:10px 14px;border:1px solid var(--brd);border-radius:8px;font-size:14px;background:var(--bg);color:var(--t);outline:none;font-family:inherit;transition:border 0.2s}.adm-input:focus{border-color:var(--gold)}
.adm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.adm-submit{width:100%;padding:14px;background:var(--gold);color:#000;border-radius:10px;font-weight:700;font-size:13px;letter-spacing:1px;border:none;cursor:pointer;margin-top:8px}.adm-submit:hover{background:#E8BC6A}
.adm-table{width:100%;border-collapse:collapse}
.adm-table th{text-align:left;padding:10px 12px;font-size:9px;font-weight:700;color:var(--d);text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--brd)}
.adm-table td{padding:10px 12px;border-bottom:1px solid var(--brd);font-size:13px;vertical-align:middle}
.adm-table tr:hover{background:var(--bg)}
.adm-table img{width:50px;height:35px;object-fit:cover;border-radius:4px}
.adm-acts{display:flex;gap:4px}
.adm-act{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--brd);background:var(--bg);color:var(--m);cursor:pointer;transition:all 0.2s}
.adm-act:hover{border-color:var(--gold);color:var(--gold)}
.adm-act.del:hover{border-color:#EF4444;color:#EF4444}
.adm-act.sold:hover{border-color:var(--orange);color:var(--orange)}
.adm-status{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700}
.adm-status.active{background:var(--gdim);color:var(--gold)}
.adm-status.sold{background:rgba(239,68,68,0.1);color:#EF4444}
.adm-olx{margin-bottom:20px;padding:16px;background:var(--bg);border:1px dashed var(--brd);border-radius:12px}
.adm-olx-title{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:8px;letter-spacing:1px}
.adm-olx-row{display:flex;gap:8px}
.adm-olx-input{flex:1;padding:10px 14px;border:1px solid var(--brd);border-radius:8px;background:var(--card);color:var(--t);font-size:13px;outline:none}.adm-olx-input:focus{border-color:var(--gold)}
.adm-olx-btn{padding:10px 18px;background:var(--gold);color:#000;border-radius:8px;font-weight:700;font-size:12px;border:none;cursor:pointer;white-space:nowrap}.adm-olx-btn:hover{background:#E8BC6A}
.toast{position:fixed;top:80px;right:20px;background:var(--card);border-left:3px solid var(--gold);border-radius:10px;padding:14px 20px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:10004;animation:fadeUp 0.3s var(--e);display:flex;align-items:center;gap:10px;max-width:320px}
</style>

// ═══ VEHICLE DATA MANAGEMENT ═══
function getAllVehicles(){
  const added=JSON.parse(localStorage.getItem('nc_vehicles')||'[]');
  const sold=JSON.parse(localStorage.getItem('nc_sold')||'[]');
  const deleted=JSON.parse(localStorage.getItem('nc_deleted')||'[]');
  const base=V.filter(v=>!deleted.includes(v.id)).map(v=>({...v,status:sold.includes(v.id)?'prodano':'na-lageru'}));
  const custom=added.filter(v=>!deleted.includes(v.id)).map(v=>({...v,status:sold.includes(v.id)?'prodano':v.status||'na-lageru'}));
  return[...custom,...base];
}
function addVehicle(v){const list=JSON.parse(localStorage.getItem('nc_vehicles')||'[]');list.unshift(v);localStorage.setItem('nc_vehicles',JSON.stringify(list));}
function deleteVehicle(id){const d=JSON.parse(localStorage.getItem('nc_deleted')||'[]');if(!d.includes(id))d.push(id);localStorage.setItem('nc_deleted',JSON.stringify(d));}
function markSold(id){const s=JSON.parse(localStorage.getItem('nc_sold')||'[]');if(!s.includes(id))s.push(id);localStorage.setItem('nc_sold',JSON.stringify(s));}
function unmarkSold(id){let s=JSON.parse(localStorage.getItem('nc_sold')||'[]');s=s.filter(x=>x!==id);localStorage.setItem('nc_sold',JSON.stringify(s));}
function updateVehicle(id,data){let list=JSON.parse(localStorage.getItem('nc_vehicles')||'[]');list=list.map(v=>v.id===id?{...v,...data}:v);localStorage.setItem('nc_vehicles',JSON.stringify(list));}

const fP=n=>n>0?n.toLocaleString('de-DE')+' KM':'Na upit';
const fK=n=>n.toLocaleString('de-DE');

function Splash({onDone}){
  const[ex,setEx]=useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setEx(true),3500);const t2=setTimeout(onDone,4300);return()=>{clearTimeout(t1);clearTimeout(t2)};},[]);
  const pts=useMemo(()=>Array.from({length:35},(_,i)=>({i,l:Math.random()*100,s:2+Math.random()*5,d:Math.random()*3.5,du:2.5+Math.random()*3})),[]);
  return(<div id="splash" className={ex?'out':''}>
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>{pts.map(p=><div key={p.i} className="s-part" style={{position:'absolute',left:p.l+'%',bottom:0,width:p.s,height:p.s,opacity:0,animation:`sParticleUp ${p.du}s ease-out ${p.d}s infinite`}}/>)}</div>
    <div className="s-center"><div className="s-logo"><img src={L} alt="N Cars"/></div><div className="s-gold-line"/><div className="s-name">N CARS</div><div className="s-tag">Uvoz &middot; Transport &middot; Prodaja Vozila</div></div>
    <div className="s-bar"/>
  </div>);
}

const Card=memo(({v,i})=>(

// ═══ ADMIN PANEL COMPONENT ═══
function AdminPanel({onClose,vehicles,refresh}){
  const[tab,setTab]=useState('manage');
  const[form,setForm]=useState({title:'',make:'',model:'',year:2020,km:0,fuel:'Dizel',kw:0,trans:'Manual',price:0,img:'',feat:false});
  const[editId,setEditId]=useState(null);
  const[olxUrl,setOlxUrl]=useState('');
  const[olxLoading,setOlxLoading]=useState(false);
  const uf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const saveVehicle=()=>{
    if(!form.title){alert('Unesite naziv vozila');return;}
    const v={...form,id:editId||('c-'+Date.now()),ks:Math.round(form.kw*1.36)};
    if(editId){updateVehicle(editId,v);}else{addVehicle(v);}
    refresh();setEditId(null);setTab('manage');
    setForm({title:'',make:'',model:'',year:2020,km:0,fuel:'Dizel',kw:0,trans:'Manual',price:0,img:'',feat:false});
    showToast('Vozilo '+(editId?'azurirano':'dodano'));
  };

  const startEdit=(v)=>{setForm({title:v.title,make:v.make,model:v.model,year:v.year,km:v.km,fuel:v.fuel,kw:v.kw||0,trans:v.trans,price:v.price,img:v.img,feat:v.feat||false});setEditId(v.id);setTab('add');};
  const handleSold=(v)=>{if(v.status==='prodano'){unmarkSold(v.id);}else{markSold(v.id);}refresh();showToast('Status azuriran');};
  const handleDelete=(v)=>{if(!confirm('Obrisati '+v.title+'?'))return;deleteVehicle(v.id);refresh();showToast('Vozilo obrisano');};

  const importOlx=()=>{
    const match=olxUrl.match(/artikal\/(\d+)/);
    if(!match){alert('Neispravan OLX link');return;}
    const id=match[1];
    const imgUrl='https://d4n0y8dshd77z.cloudfront.net/listings/'+id+'/lg/img-placeholder.jpeg';
    setForm({title:'OLX Vozilo #'+id,make:'',model:'',year:2020,km:0,fuel:'Dizel',kw:0,trans:'Manual',price:0,img:imgUrl,feat:false});
    setEditId(null);setTab('add');setOlxUrl('');
    showToast('OLX ID preuzet - popunite detalje');
  };

  const active=vehicles.filter(v=>v.status!=='prodano');
  const sold=vehicles.filter(v=>v.status==='prodano');

  return(
    <div className="adm-ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="adm-panel">
        <div className="adm-head">
          <div className="adm-title">Admin Panel <span className="adm-badge">ADMIN</span></div>
          <button className="adm-close" onClick={onClose}>&times;</button>
        </div>
        <div className="adm-body">
          <div className="adm-tabs">
            <button className={`adm-tab ${tab==='manage'?'on':''}`} onClick={()=>setTab('manage')}>Upravljaj ({vehicles.length})</button>
            <button className={`adm-tab ${tab==='add'?'on':''}`} onClick={()=>{setTab('add');setEditId(null);}}>Dodaj Vozilo</button>
            <button className={`adm-tab ${tab==='sold'?'on':''}`} onClick={()=>setTab('sold')}>Prodano ({sold.length})</button>
          </div>

          {tab==='manage'&&(<div>
            <div className="adm-olx">
              <div className="adm-olx-title">&#x1F517; Brzi Uvoz sa OLX.ba</div>
              <div className="adm-olx-row">
                <input className="adm-olx-input" value={olxUrl} onChange={e=>setOlxUrl(e.target.value)} placeholder="https://olx.ba/artikal/12345678" onKeyDown={e=>{if(e.key==='Enter')importOlx();}}/>
                <button className="adm-olx-btn" onClick={importOlx}>Uvezi</button>
              </div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table className="adm-table">
                <thead><tr><th>Slika</th><th>Naziv</th><th>Cijena</th><th>God.</th><th>Status</th><th>Akcije</th></tr></thead>
                <tbody>
                  {active.map(v=>(
                    <tr key={v.id}>
                      <td><img src={v.img} alt="" style={{background:'var(--bg)'}}/></td>
                      <td style={{fontWeight:600,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.title}</td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--gold)'}}>{fP(v.price)}</td>
                      <td>{v.year}</td>
                      <td><span className="adm-status active">Aktivan</span></td>
                      <td><div className="adm-acts">
                        <button className="adm-act" onClick={()=>startEdit(v)}>&#x270F;&#xFE0F;</button>
                        <button className="adm-act sold" onClick={()=>handleSold(v)}>&#x2705;</button>
                        <button className="adm-act del" onClick={()=>handleDelete(v)}>&#x1F5D1;&#xFE0F;</button>
                      </div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>)}

          {tab==='sold'&&(<div>
            {sold.length===0?<div style={{textAlign:'center',padding:40,color:'var(--d)'}}>Nema prodanih vozila</div>:
            <table className="adm-table">
              <thead><tr><th>Slika</th><th>Naziv</th><th>Cijena</th><th>Akcije</th></tr></thead>
              <tbody>
                {sold.map(v=>(
                  <tr key={v.id} style={{opacity:0.6}}>
                    <td><img src={v.img} alt="" style={{filter:'grayscale(50%)'}}/></td>
                    <td style={{fontWeight:600}}>{v.title}</td>
                    <td style={{fontFamily:'var(--mono)',color:'var(--d)'}}>{fP(v.price)}</td>
                    <td><div className="adm-acts">
                      <button className="adm-act" onClick={()=>handleSold(v)} title="Vrati u prodaju">&#x21A9;&#xFE0F;</button>
                      <button className="adm-act del" onClick={()=>handleDelete(v)}>&#x1F5D1;&#xFE0F;</button>
                    </div></td>
                  </tr>
                ))}
              </tbody>
            </table>}
          </div>)}

          {tab==='add'&&(<div>
            <h3 style={{fontWeight:700,fontSize:16,marginBottom:18}}>{editId?'Uredi Vozilo':'Dodaj Novo Vozilo'}</h3>
            <div className="adm-field"><label className="adm-label">Naziv</label><input className="adm-input" value={form.title} onChange={e=>uf('title',e.target.value)} placeholder="VW GOLF 7 2.0 TDI 110kw"/></div>
            <div className="adm-row">
              <div className="adm-field"><label className="adm-label">Marka</label><input className="adm-input" value={form.make} onChange={e=>uf('make',e.target.value)} placeholder="Volkswagen"/></div>
              <div className="adm-field"><label className="adm-label">Model</label><input className="adm-input" value={form.model} onChange={e=>uf('model',e.target.value)} placeholder="Golf 7"/></div>
            </div>
            <div className="adm-row">
              <div className="adm-field"><label className="adm-label">Godina</label><input className="adm-input" type="number" value={form.year} onChange={e=>uf('year',+e.target.value)}/></div>
              <div className="adm-field"><label className="adm-label">Kilometra&#382;a</label><input className="adm-input" type="number" value={form.km} onChange={e=>uf('km',+e.target.value)}/></div>
            </div>
            <div className="adm-row">
              <div className="adm-field"><label className="adm-label">Gorivo</label><select className="adm-input" value={form.fuel} onChange={e=>uf('fuel',e.target.value)}><option>Dizel</option><option>Benzin</option><option>Hybrid</option></select></div>
              <div className="adm-field"><label className="adm-label">Mjenja&#269;</label><select className="adm-input" value={form.trans} onChange={e=>uf('trans',e.target.value)}><option>Manual</option><option>DSG</option><option>Automatik</option></select></div>
            </div>
            <div className="adm-row">
              <div className="adm-field"><label className="adm-label">Snaga (kW)</label><input className="adm-input" type="number" value={form.kw} onChange={e=>uf('kw',+e.target.value)}/></div>
              <div className="adm-field"><label className="adm-label">Cijena (KM)</label><input className="adm-input" type="number" value={form.price} onChange={e=>uf('price',+e.target.value)}/></div>
            </div>
            <div className="adm-field"><label className="adm-label">URL Slike</label><input className="adm-input" value={form.img} onChange={e=>uf('img',e.target.value)} placeholder="https://..."/></div>
            {form.img&&<div style={{marginBottom:14}}><img src={form.img} alt="" style={{height:80,borderRadius:8,objectFit:'cover',background:'var(--bg)'}}/></div>}
            <div className="adm-field" style={{display:'flex',alignItems:'center',gap:10}}>
              <input type="checkbox" checked={form.feat} onChange={e=>uf('feat',e.target.checked)} id="feat-check" style={{accentColor:'var(--gold)',width:18,height:18}}/>
              <label htmlFor="feat-check" style={{fontSize:13,color:'var(--m)'}}>Izdvojeno vozilo</label>
            </div>
            <button className="adm-submit" onClick={saveVehicle}>{editId?'&#x1F4BE; Spremi Izmjene':'&#x1F697; Objavi Vozilo'}</button>
          </div>)}
        </div>
      </div>
    </div>
  );
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.innerHTML='&#x2713; '+msg;
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);
}

function App(){
  const[splash,setSplash]=useState(true);
  const[solid,setSolid]=useState(false);
  const[btt,setBtt]=useState(false);
  const[mob,setMob]=useState(false);
  const[f,setF]=useState('all');
  const[vehicles,setVehicles]=useState(getAllVehicles);
  const[showPin,setShowPin]=useState(false);
  const[showAdmin,setShowAdmin]=useState(false);
  const[isAdmin,setIsAdmin]=useState(()=>localStorage.getItem('nc_admin')==='true');
  const[pin,setPin]=useState('');
  const[pinErr,setPinErr]=useState('');
  const refresh=()=>setVehicles(getAllVehicles());
  const activeVehicles=vehicles.filter(v=>v.status!=='prodano');
  const makes=[...new Set(activeVehicles.map(v=>v.make))].sort();
  const list=useMemo(()=>{let l=activeVehicles;if(f==='feat')return l.filter(v=>v.feat);if(f!=='all')return l.filter(v=>v.make===f);return l;},[f,vehicles]);

  // Ctrl+Shift+G admin shortcut
  useEffect(()=>{
    const h=e=>{if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='G'){e.preventDefault();if(isAdmin){setShowAdmin(true);}else{setShowPin(true);}}if(e.key==='Escape'){setShowPin(false);setShowAdmin(false);setPin('');}};
    document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);
  },[isAdmin]);

  const checkPin=()=>{if(pin==='1234'){setIsAdmin(true);localStorage.setItem('nc_admin','true');setShowPin(false);setShowAdmin(true);setPin('');}else{setPinErr('Pogresan PIN');setPin('');setTimeout(()=>setPinErr(''),2000);}};

  useEffect(()=>{
    let scrolling=null;
    const gL=document.getElementById('glowL'),gR=document.getElementById('glowR');
    const h=()=>{
      setSolid(scrollY>80);setBtt(scrollY>500);
      const d=document.documentElement;document.getElementById('prog').style.width=((d.scrollTop/(d.scrollHeight-d.clientHeight))*100)+'%';
      // Mobile glow
      if(window.innerWidth<=768){
        if(gL)gL.classList.add('active');
        if(gR)gR.classList.add('active');
        clearTimeout(scrolling);
        scrolling=setTimeout(()=>{if(gL)gL.classList.remove('active');if(gR)gR.classList.remove('active');},300);
      }
    };
    addEventListener('scroll',h);return()=>removeEventListener('scroll',h);
  },[]);

  useEffect(()=>{const o=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('vis');o.unobserve(x.target);}});},{threshold:0.06});document.querySelectorAll('.reveal').forEach(el=>o.observe(el));return()=>o.disconnect();});

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;

  const mq='VOLKSWAGEN \u00B7 CITROEN \u00B7 MAN \u00B7 DSG \u00B7 4x4 \u00B7 EU UVOZ \u00B7 ZENICA \u00B7 TRANSPORT';

  return(<>
    <nav className={`nav ${solid?'solid':''}`}><div className="nav-in">
      <a href="#" className="n-brand"><img src={L} alt=""/><span>N CARS</span></a>
      <div className="n-links"><a href="#top" className="n-link">Po&#269;etna</a><a href="#fleet" className="n-link">Vozila</a><a href="#reach" className="n-link">Kontakt</a></div>
      <div className="n-right"><a href="tel:+38762223064" className="n-icon">&#x1F4DE;</a><a href="https://wa.me/38762223064" className="n-icon">&#x1F4AC;</a><a href="#fleet" className="n-cta">Ponuda</a></div>
      <button className={`n-ham ${mob?'open':''}`} onClick={()=>setMob(!mob)}><span/><span/><span/></button>
    </div></nav>
    <div className={`m-ov ${mob?'open':''}`} onClick={()=>setMob(false)}>
      <a href="#top">Po&#269;etna</a><a href="#fleet">Vozila</a><a href="#reach">Kontakt</a>
      <div style={{display:'flex',gap:12,marginTop:16}}><a href="tel:+38762223064" className="btn btn-g" style={{padding:'14px 28px'}}>&#x1F4DE; Pozovi</a><a href="https://wa.me/38762223064" className="btn btn-o" style={{padding:'14px 28px',background:'#25D366',borderColor:'#25D366',color:'#fff'}}>&#x1F4AC;</a></div>
    </div>

    <section className="hero" id="top">
      <div className="hero-img"/><div className="hero-grad"/>
      <div className="hero-in">
        <div className="hero-text">
          <div className="hero-pill">&#x2726; Premium Polovna Vozila</div>
          <h1 className="hero-h">Vozila Koja<br/><em>Govore Za Sebe</em></h1>
          <p className="hero-p">Uvoz, transport i prodaja provjerenih vozila iz Evropske Unije. Svako vozilo sa kompletnom historijom i garancijom na porijeklo.</p>
          <div className="hero-btns"><a href="#fleet" className="btn btn-g">Pogledaj Ponudu &rarr;</a><a href="#reach" className="btn btn-o">Kontakt</a></div>
        </div>
        <div className="hero-visual">
          <div className="hero-card">
            <div className="hero-card-stat">
              <div className="hcs"><div className="hcs-n">{V.length}</div><div className="hcs-l">Vozila</div></div>
              <div className="hero-card-divider"/>
              <div className="hcs"><div className="hcs-n">EU</div><div className="hcs-l">Uvoz</div></div>
              <div className="hero-card-divider"/>
              <div className="hcs"><div className="hcs-n">24h</div><div className="hcs-l">Odgovor</div></div>
            </div>
            <div className="hero-card-brands">{makes.map(m=><span key={m} className="hcb">{m}</span>)}</div>
          </div>
        </div>
      </div>
      <div className="hero-scroll"><span style={{fontSize:20}}>&darr;</span><span>Scroll</span></div>
    </section>

    <div className="mq"><div className="mq-track">{[1,2].map(r=><span key={r}>{mq.split('\u00B7').map((t,i)=><span key={i}><span className="mq-item">{t.trim()}</span><span className="mq-dot"/></span>)}</span>)}</div></div>

    <section className="trust">
      <div className="trust-grid">
        <div className="trust-card reveal"><div className="trust-icon"><span>&#x1F6E1;</span></div><h3 className="trust-t">Provjerena Vozila</h3><p className="trust-d">Garancija na porijeklo i kilometra&#382;u svakog vozila u ponudi.</p></div>
        <div className="trust-card reveal"><div className="trust-icon"><span>&#x1F91D;</span></div><h3 className="trust-t">Transparentna Prodaja</h3><p className="trust-d">Fer cijene bez skrivenih tro&#353;kova. Sve informacije unaprijed.</p></div>
        <div className="trust-card reveal"><div className="trust-icon"><span>&#x1F527;</span></div><h3 className="trust-t">Servisirano</h3><p className="trust-d">Vozila pregledana i servisirana prije isporuke kupcu.</p></div>
      </div>
    </section>

    <section className="sec" id="fleet"><div style={{maxWidth:1400,margin:'0 auto'}}>
      <div className="sec-head reveal"><div className="sec-ey">Ponuda</div><h2 className="sec-t">Kompletna Ponuda Vozila</h2><p className="sec-sub">Kvalitetna polovna vozila iz EU sa provjerenom historijom.</p></div>
      <div className="filters"><button className={`fchip ${f==='all'?'on':''}`} onClick={()=>setF('all')}>Sva ({activeVehicles.length})</button><button className={`fchip ${f==='feat'?'on':''}`} onClick={()=>setF('feat')}>Izdvojena</button>{makes.map(m=><button key={m} className={`fchip ${f===m?'on':''}`} onClick={()=>setF(m)}>{m}</button>)}</div>
      <div className="vgrid">{list.map((v,i)=><Card key={v.id} v={v} i={i}/>)}</div>
      {list.length===0&&<div style={{textAlign:'center',padding:80,color:'var(--d)'}}>Nema rezultata.</div>}
    </div></section>

    <section className="contact" id="reach"><div className="ct-grid">
      <div className="ct-left reveal">
        <h2>Razgovarajmo o Va&#353;em <em>Novom Vozilu</em></h2>
        <p>Slobodno nas kontaktirajte za informacije o vozilima, uvozu ili transportu.</p>
        <div className="ct-items">
          <div className="ct-item"><div className="ct-icon"><span>&#x1F4DE;</span></div><div><div className="ct-lb">Telefon</div><div className="ct-v"><a href="tel:+38762223064">062 223 064</a></div></div></div>
          <div className="ct-item"><div className="ct-icon"><span>&#x1F4AC;</span></div><div><div className="ct-lb">WhatsApp</div><div className="ct-v"><a href="https://wa.me/38762223064">062 223 064</a></div></div></div>
          <div className="ct-item"><div className="ct-icon"><span>&#x1F4CD;</span></div><div><div className="ct-lb">Lokacija</div><div className="ct-v">Zenica, BiH</div></div></div>
          <div className="ct-item"><div className="ct-icon"><span>&#x1F554;</span></div><div><div className="ct-lb">Radno Vrijeme</div><div className="ct-v">Pon&#8211;Sub: 10&#8211;18h &middot; Ned: Zatvoreno</div></div></div>
        </div>
      </div>
      <div className="reveal"><form className="ct-form" onSubmit={e=>{e.preventDefault();alert('Poruka poslana!')}}>
        <div className="ct-ft">Po&#353;alji Upit</div>
        <div className="ct-ff"><label className="ct-fl">Ime</label><input className="ct-fi" placeholder="Va&#353;e ime" required/></div>
        <div className="ct-ff"><label className="ct-fl">Telefon</label><input className="ct-fi" type="tel" placeholder="06X XXX XXX"/></div>
        <div className="ct-ff"><label className="ct-fl">Poruka</label><textarea className="ct-fi" rows={4} placeholder="Va&#353;a poruka..." style={{resize:'vertical'}}/></div>
        <button type="submit" className="ct-fs">Po&#353;alji &rarr;</button>
      </form></div>
    </div></section>

    <footer className="foot"><div className="foot-in">
      <div className="foot-b"><img src={L} alt=""/><span>N CARS</span></div>
      <div className="foot-m">Uvoz, Transport i Prodaja Vozila<br/>Zenica, BiH &middot; 062 223 064<br/>&copy; 2026 N Cars &mdash; Serious About Cars</div>
      <div className="foot-s"></div>
    </div></footer>

    <div className="flt"><a href="https://wa.me/38762223064" className="wa">&#x1F4AC;</a><a href="tel:+38762223064" className="ph">&#x1F4DE;</a></div>
    <button id="btt" className={btt?'on':''} onClick={()=>scrollTo({top:0,behavior:'smooth'})}>&uarr;</button>

    {/* PIN MODAL */}
    {showPin&&<div className="pin-ov" onClick={e=>{if(e.target===e.currentTarget){setShowPin(false);setPin('');}}}>
      <div className="pin-box">
        <h3>&#x1F510; Admin</h3>
        <p>Unesite 4-cifreni PIN</p>
        <input className="pin-inp" type="password" maxLength={4} value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')checkPin();}} autoFocus/>
        {pinErr&&<div className="pin-err">{pinErr}</div>}
        <button className="pin-btn" onClick={checkPin}>Pristupi</button><br/>
        <button className="pin-cancel" onClick={()=>{setShowPin(false);setPin('');}}>Odustani</button>
      </div>
    </div>}

    {/* ADMIN PANEL */}
    {showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)} vehicles={vehicles} refresh={refresh}/>}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
